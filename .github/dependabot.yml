version: 2
updates:
  - package-ecosystem: cargo
    directories:
      - "/"
    schedule:
      interval: daily
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 6
    cooldown:
      default-days: 7
      # crates published by anza-team bypass the cooldown
      exclude:
        - "solana-*"
        - "agave-*"
        - "spl-*"
        - "rts-alloc"
        - "shaq"
        - "wincode"

  # split from root directory schedule to avoid duplicate checks
  - package-ecosystem: cargo
    directories:
      - "/tools/dev-bins"
      - "/crates/programs/sbf"
    schedule:
      interval: daily
      time: "14:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 6
    cooldown:
      default-days: 7
      # crates published by anza-team bypass the cooldown
      exclude:
        - "solana-*"
        - "agave-*"
        - "spl-*"
        - "rts-alloc"
        - "shaq"
        - "wincode"


  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 4

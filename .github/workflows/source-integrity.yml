name: Source Integrity

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-integrity:
    name: Verify source manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Verify source integrity
        run: scripts/dev/verify-source-integrity.sh
